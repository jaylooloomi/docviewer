<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能審約結果檢視器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    font-size: 14px;
    background: #f5f6fa;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 頂部工具列 ── */
  #topbar {
    background: #fff;
    border-bottom: 1px solid #dde1e7;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    flex-wrap: wrap;
  }
  .file-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-group label {
    font-weight: 600;
    color: #555;
    white-space: nowrap;
    font-size: 13px;
  }
  .file-group input[type="file"] {
    border: 1px dashed #aaa;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    background: #fafafa;
    font-size: 12px;
    max-width: 300px;
  }
  .file-group input[type="file"]:hover { border-color: #4a90e2; background: #f0f6ff; }
  .status-badge {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #eee;
    color: #888;
    white-space: nowrap;
  }
  /* hide the HTML file upload group by default (toggleable) */
  #htmlFileGroup { display: none !important; }
  .status-badge.loaded { background: #e8f8e8; color: #27ae60; }
  .status-badge.error  { background: #fde8e8; color: #c0392b; }

  /* ── 主體雙欄 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 左側：合約文件 ── */
  #contractPanel {
    width: 65%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #dde1e7;
    overflow: hidden;
  }

  /* 固定標頭 */
  #contractPanelHeader {
    flex-shrink: 0;
    padding: 10px 14px 0;
    background: #fff;
    border-bottom: 1px solid #dde1e7;
  }
  #contractPanelHeader h2 {
    font-size: 13px;
    font-weight: 700;
    color: #444;
    padding-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 缺漏 banner（固定於標頭，不隨文件捲動） */
  #missingBanner {
    display: none;
    background: #fde8e8;
    border: 2px solid #e53e3e;
    border-left: 6px solid #e53e3e;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    color: #c0392b;
    animation: bannerPop 0.3s ease;
  }
  #missingBanner .banner-icon  { font-size: 26px; line-height: 1; margin-bottom: 4px; }
  #missingBanner .banner-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
  #missingBanner .banner-sub   { font-size: 12px; color: #a93226; }
  @keyframes bannerPop {
    0%   { transform: scale(0.97); opacity: 0; }
    100% { transform: scale(1);    opacity: 1; }
  }

  /* 可捲動文件區 */
  #contractBody {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    background: #9e9e9e;
  }

  /* 空白提示 */
  #emptyContractState {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #bbb;
    font-size: 15px;
    background: #f5f6fa;
  }

  /* ── 右側：審核卡片 ── */
  #reviewPanel {
    width: 35%;
    overflow-y: auto;
    padding: 18px;
    background: #f4f8ff;
    border-left: 1px solid #e6eefc;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  #reviewPanel h2 {
    font-size: 15px;
    font-weight: 800;
    color: #2b4f8a;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #d7e7ff;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #888;
    margin: 16px 0 6px;
    text-transform: uppercase;
  }
  .section-title:first-of-type { margin-top: 0; }

  .review-card {
    background: #fff;
    border: 1px solid #e6eefc;
    border-radius: 10px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s, transform 0.08s;
    overflow: hidden;
    padding: 12px;
  }
  .review-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-color: #4a90e2; }
  .review-card.card-selected { border-color: #4a90e2; box-shadow: 0 0 0 2px #c5d9f8; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-badge {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 6px;
    margin-top: 0;
    white-space: nowrap;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.02);
  }
  .badge-fail { background: #fde8e8; color: #c0392b; }
  .badge-pass { background: #e8f8e8; color: #27ae60; }

  .card-name { font-size: 14px; line-height: 1.4; flex: 1; font-weight: 700; }
  .card-name.fail { color: #b93737; font-weight: 800; }
  .card-name.pass { color: #1f2d3d; }

  .card-detail { display: none; padding: 12px; border-top: 1px solid #f0f6ff; background: #fbfcff; }
  .card-detail.open { display: block; }

  .detail-label {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    margin: 10px 0 4px;
    text-transform: uppercase;
  }
  .detail-text {
    font-size: 13px;
    color: #333;
    white-space: pre-wrap;
    line-height: 1.6;
    background: #ffffff;
    border-radius: 6px;
    padding: 12px 12px;
    border: 1px solid #eef4ff;
  }
  .block-ids-hint { font-size: 12px; color: #6b7280; padding: 8px 0 6px; }

  /* ── 高亮樣式（套用於 div.t 元素） ── */
  /* 不符合 → 紅色螢光 */
  .t.hl-fail {
    background-color: rgba(255, 180, 180, 0.75) !important;
  }
  /* 符合 → 黃色螢光 */
  .t.hl-pass {
    background-color: rgba(255, 245, 100, 0.75) !important;
  }

  /* 聚焦輪廓與淡入動畫：當使用者點選卡片時加入 .hl-focus */
  .t.hl-fail, .t.hl-pass {
    position: relative;
    transition: box-shadow 220ms ease, transform 220ms ease;
    border-radius: 4px;
  }

  @keyframes focusFade {
    0% { opacity: 0; transform: scale(0.98); }
    100% { opacity: 1; transform: scale(1); }
  }

  .t.hl-fail::after,
  .t.hl-pass::after {
    content: '';
    position: absolute;
    left: -8px;
    right: -8px;
    top: -6px;
    bottom: -6px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
  }

  .t.hl-fail.hl-focus::after {
    box-shadow: 0 0 0 4px rgba(192,57,43,0.08), 0 6px 24px rgba(192,57,43,0.06);
    animation: focusFade 260ms cubic-bezier(.2,.9,.2,1) forwards;
  }
  .t.hl-pass.hl-focus::after {
    box-shadow: 0 0 0 4px rgba(74,144,226,0.10), 0 6px 24px rgba(74,144,226,0.06);
    animation: focusFade 260ms cubic-bezier(.2,.9,.2,1) forwards;
  }

  /* 當卡片選中時，稍微抬起卡片並強化邊框 */
  .review-card.card-selected { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(34,60,110,0.08); }

  /* 捲軸 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #aaa; }
</style>
</head>
<body>

<div id="topbar">
  <div id="htmlFileGroup" class="file-group">
    <label>📄 合約文件 (HTML)：</label>
    <input type="file" id="htmlInput" accept=".html,.htm">
    <span id="htmlStatus" class="status-badge">未上傳</span>
  </div>
  <div class="file-group">
    <label>📋 API 結果 (TXT/JSON)：</label>
    <input type="file" id="jsonInput" accept=".txt,.json">
    <span id="jsonStatus" class="status-badge">未上傳</span>
    </div>
    
</div>

<div id="main">

  <div id="contractPanel">
    <div id="contractPanelHeader" style="display:block;">
      <h2 id="contractTitleText">編輯器＋合約檢視</h2>
      <div id="missingBanner" style="display:none; background:#fde8e8; border:2px solid #e53e3e; border-left:6px solid #e53e3e; border-radius:8px; padding:14px 16px; margin-top:8px; color:#c0392b;">
        <div class="banner-title">合約缺漏此條文</div>
        <div class="banner-sub">本合約中未包含此審查項目所要求的相關條款，建議補充。</div>
      </div>
    </div>
    <div id="contractBody">
      <!-- Embedded editor (keep) -->
      <div id="editorEmbed" style="height:100%;">
        <iframe id="editorFrame" src="/?embed=1" title="Editor" style="width:100%; height:100%; border:0;"></iframe>
      </div>
      <!-- Contract content injected here (preserve iframe above) -->
      <div id="contractContent" style="flex:1; overflow:auto; background:#fff;">
        <div id="emptyContractState" style="display:flex; align-items:center; justify-content:center; height:100%; color:#bbb; font-size:15px; background:#f5f6fa;">請上傳合約 HTML 文件</div>
      </div>
    </div>
  </div>

  <div id="reviewPanel">
    <div id="reviewContent">
      <h2>違規條款分析</h2>
      <div id="reviewCards"></div>
    </div>
  </div>

</div>

<script>
  /* State */
  let htmlLoaded = false;
  let parsedData = null;
  let currentSelected = null;

  /* DOM refs */
  const htmlInput = document.getElementById('htmlInput');
  const jsonInput = document.getElementById('jsonInput');
  const htmlStatus = document.getElementById('htmlStatus');
  const jsonStatus = document.getElementById('jsonStatus');
  const contractBody = document.getElementById('contractBody');
  const contractContent = document.getElementById('contractContent');
  const contractPanelHeader = document.getElementById('contractPanelHeader');
  const contractTitleText = document.getElementById('contractTitleText');
  const missingBanner = document.getElementById('missingBanner');
  const reviewCards = document.getElementById('reviewCards');

  /* 1. Upload contract HTML */
  htmlInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    htmlStatus.textContent = '讀取中...';
    htmlStatus.className = 'status-badge';

    const reader = new FileReader();
    reader.onload = (ev) => {
      injectContractHTML(ev.target.result, file.name);
      htmlLoaded = true;
      htmlStatus.textContent = '✓ ' + file.name;
      htmlStatus.className = 'status-badge loaded';
      if (parsedData) runBlockMapping(parsedData);
    };
    reader.onerror = () => {
      htmlStatus.textContent = '❌ 讀取失敗';
      htmlStatus.className = 'status-badge error';
    };
    reader.readAsText(file, 'UTF-8');
  });

  function injectContractHTML(htmlContent, fileName) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, 'text/html');

    // Inject styles from uploaded HTML (once)
    if (!document.querySelector('style[data-pdfhtml]')) {
      doc.querySelectorAll('style').forEach(style => {
        const s = document.createElement('style');
        s.setAttribute('data-pdfhtml', '1');
        s.textContent = style.textContent;
        document.head.appendChild(s);
      });

      const override = document.createElement('style');
      override.setAttribute('data-pdfhtml', 'override');
      override.textContent = `#page-container { position: relative !important; top: auto !important; left: auto !important; bottom: auto !important; right: auto !important; overflow: visible !important; }`;
      document.head.appendChild(override);
    }

    // clear old content (but keep editor iframe in #editorEmbed)
    contractContent.innerHTML = '';

    const pageContainer = doc.getElementById('page-container');
    if (pageContainer) {
      contractContent.appendChild(document.adoptNode(pageContainer));
    } else {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = doc.body.innerHTML;
      contractContent.appendChild(wrapper);
    }

    contractPanelHeader.style.display = 'block';
    contractTitleText.textContent = fileName.replace(/\.[^.]+$/, '');
  }

  /* 2. Upload API JSON/TXT */
  jsonInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    jsonStatus.textContent = '讀取中...';
    jsonStatus.className = 'status-badge';

    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        parsedData = JSON.parse(ev.target.result);
        renderReviewCards(parsedData);
        jsonStatus.textContent = '✓ ' + file.name;
        jsonStatus.className = 'status-badge loaded';
        if (htmlLoaded) runBlockMapping(parsedData);
      } catch(err) {
        jsonStatus.textContent = '❌ 解析失敗：' + err.message;
        jsonStatus.className = 'status-badge error';
      }
    };
    reader.readAsText(file, 'UTF-8');
  });

  // --- Sample JSON (embedded) for quick testing ---
  const SAMPLE_JSON = {
  "request_id": "req-20260309143722",
  "proc_start_time": "2026-03-09 14:54:02",
  "proc_end_time": "2026-03-09 14:54:02",
  "return_content": {
    "contract_id": "202603091437",
    "version": "00",
    "status": 1,
    "message": "全部條款皆已審閱完成",
    "contract_chunks": {
      "0": {
        "title": "合約前言",
        "article_no": "",
        "content": "維 護 合 約 書\n甲方  佛光大學\n立合約書人:\n乙方  宏思科技\n茲因乙方提供甲方電腦應用軟體系統維護服 務，雙方同意並基於平等互惠之原則訂定本契約，共同遵守，其條款如下："
      },
      "1": {
        "title": "標的物",
        "article_no": "第一條",
        "content": "本合約維護標的物係指甲方委由乙方開發之「合約管理系統」（以下簡稱本系統）。"
      },
      "2": {
        "title": "維護範圍及內容",
        "article_no": "第二條",
        "content": "一、電話諮詢，線上即時服務：\n*本系統基本操作解說。\n*本系統環境基本設定解說。\n二、Q&A傳真或E-mail 即時服務：\n*本系統基本操作步驟/程序說明。\n*本系統使用常見問題與處理說明。\n*資訊環境一般狀況排除方法。\n三、遠端通訊連線服務(WIN:遠端桌面、TeamViewer、Skype、Email):\n*問題偵測與判斷處理。\n*程式潛在錯誤(BUG)更新。\n*遠端資料重整作業等。\n四、系統維護範圍係指簽約當時為使本系統正常運作所產生的所有程式，以及本合約書維護期間所產生的程式。\n五、甲方因校務研究 暨資訊整合需要，乙方需無償提供甲方所需標的物data\nview資料供介接使用。"
      },
      "3": {"title":"維護期間","article_no":"第三條","content":"本系統之維護日期自2026年12月31日至止。"},
      "4": {"title":"維護費用及付款方式","article_no":"第四條","content":"本合約維護費用總額計新台幣10,000元整(含稅)。\n本維護費用於甲乙雙方簽署合約生效後，乙方一次請款開立統一發票向甲方請款，甲方匯入乙方指定帳戶。"},
      "5": {"title":"維護方式","article_no":"第五條","content":"..."},
      "6": {"title":"保密及權利義務","article_no":"第六條","content":"..."},
      "7": {"title":"違約罰則","article_no":"第七條","content":"..."}
    },
    "sow_review_result": "",
    "quotation_review_result": "",
    "review_results": SAMPLE_REVIEW_RESULTS_PLACEHOLDER
  }
};

  // Build a smaller placeholder review_results object using the external test file will be inserted by server-side when needed.
  // For now we will lazily load full sample content from the test file via fetch is not available; instead we'll store only a minimal placeholder
  const SAMPLE_REVIEW_RESULTS_PLACEHOLDER = {
    "合規性": [],
    "合理性": [],
    "完整性": []
  };

  // Button handler: load sample JSON into page
  const loadSampleBtn = document.getElementById('loadSampleBtn');
  if (loadSampleBtn) {
    loadSampleBtn.addEventListener('click', () => {
      try {
        // Attempt to read test file via fetch (served path may not exist). Fallback to embedded SAMPLE_JSON.
        fetch('/test/智能審約API回傳審核結果.txt').then(r => {
          if (!r.ok) throw new Error('not-found');
          return r.text();
        }).then(txt => {
          try {
            parsedData = JSON.parse(txt);
          } catch (e) {
            parsedData = SAMPLE_JSON; // fallback
          }
          renderReviewCards(parsedData);
          jsonStatus.textContent = '✓ 範例載入';
          jsonStatus.className = 'status-badge loaded';
          if (htmlLoaded) runBlockMapping(parsedData);
        }).catch(_ => {
          parsedData = SAMPLE_JSON;
          renderReviewCards(parsedData);
          jsonStatus.textContent = '✓ 範例載入';
          jsonStatus.className = 'status-badge loaded';
          if (htmlLoaded) runBlockMapping(parsedData);
        });
      } catch (err) {
        parsedData = SAMPLE_JSON;
        renderReviewCards(parsedData);
        jsonStatus.textContent = '✓ 範例載入';
        jsonStatus.className = 'status-badge loaded';
        if (htmlLoaded) runBlockMapping(parsedData);
      }
    });
  }

  /* 3. Block mapping */
  function runBlockMapping(data) {
    const chunks = data.return_content && data.return_content.contract_chunks;
    if (!chunks) return;

    const articleToBlock = {};
    Object.entries(chunks).forEach(([key, chunk]) => {
      if (chunk.article_no && chunk.article_no.trim()) {
        articleToBlock[chunk.article_no.trim()] = key;
      }
    });

    let currentBlock = '0';
    const divTs = contractContent.querySelectorAll('.t');
    divTs.forEach(div => {
      const text = div.textContent.trim();
      if (articleToBlock[text] !== undefined) {
        currentBlock = articleToBlock[text];
      }
      div.setAttribute('data-block', currentBlock);
    });
  }

  /* 4. Render review cards */
  function renderReviewCards(data) {
    const reviewResults = data.return_content && data.return_content.review_results || {};
    document.getElementById('reviewContent').style.display = 'block';
    reviewCards.innerHTML = '';

    const categoryOrder = ['合規性', '合理性', '完整性'];
    categoryOrder.forEach(cat => {
      if (!reviewResults[cat] || !reviewResults[cat].length) return;
      const sec = document.createElement('div');
      sec.className = 'section-title';
      sec.textContent = cat;
      reviewCards.appendChild(sec);
      reviewResults[cat].forEach(item => reviewCards.appendChild(buildCard(item)));
    });

    Object.keys(reviewResults).forEach(cat => {
      if (categoryOrder.includes(cat) || !reviewResults[cat] || !reviewResults[cat].length) return;
      const sec = document.createElement('div');
      sec.className = 'section-title';
      sec.textContent = cat;
      reviewCards.appendChild(sec);
      reviewResults[cat].forEach(item => reviewCards.appendChild(buildCard(item)));
    });
  }

  function buildCard(item) {
    const detail = item.detail || {};
    const result = detail['審查結果'] || '';
    const isFail = result === '不符合';

    const card = document.createElement('div');
    card.className = 'review-card';

    const header = document.createElement('div');
    header.className = 'card-header';

    const badge = document.createElement('span');
    badge.className = `card-badge ${isFail ? 'badge-fail' : 'badge-pass'}`;
    badge.textContent = result || '—';

    const name = document.createElement('span');
    name.className = `card-name ${isFail ? 'fail' : 'pass'}`;
    name.textContent = item.name;

    header.appendChild(badge);
    header.appendChild(name);
    card.appendChild(header);

    const hint = document.createElement('div');
    hint.className = 'block-ids-hint';
    hint.textContent = item.block_ids === '無' ? '📄 條文對應：合約缺漏' : `📄 條文對應：第 ${item.block_ids} 區塊`;
    card.appendChild(hint);

    const detailEl = document.createElement('div');
    detailEl.className = 'card-detail';
    ['審查說明', '應當遵循的標準', '條文範例'].forEach(field => {
      if (!detail[field]) return;
      const lbl = document.createElement('div');
      lbl.className = 'detail-label';
      lbl.textContent = field;
      const txt = document.createElement('div');
      txt.className = 'detail-text';
      txt.textContent = detail[field];
      detailEl.appendChild(lbl);
      detailEl.appendChild(txt);
    });
    card.appendChild(detailEl);

    card.addEventListener('click', () => {
      if (currentSelected && currentSelected !== card) {
        currentSelected.classList.remove('card-selected');
        currentSelected.querySelector('.card-detail').classList.remove('open');
      }
      detailEl.classList.add('open');
      card.classList.add('card-selected');
      currentSelected = card;
      highlightBlocks(item.block_ids, result);
    });

    return card;
  }

  /* 5. Highlight */
  function highlightBlocks(blockIds, result) {
    // Use postMessage to instruct the iframe editor to highlight via ProseMirror decorations
    missingBanner.style.display = 'none';

    if (!blockIds || blockIds === '無') {
      missingBanner.style.animation = 'none';
      missingBanner.offsetHeight;
      missingBanner.style.animation = '';
      missingBanner.style.display = 'block';
      return;
    }

    const ids = blockIds.split(',').map(s => s.trim()).filter(Boolean);
    const frame = document.getElementById('editorFrame');
    if (!frame || !frame.contentWindow) return;

    const chunks = parsedData && parsedData.return_content && parsedData.return_content.contract_chunks;

    frame.contentWindow.postMessage(
      {
        type: 'HIGHLIGHT_BLOCKS',
        blockIds: ids,
        result: result,
        chunks: chunks,
      },
      '*'
    );
  }

</script>

</body>
</html>
